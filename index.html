<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matic Tech Store</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f1f3f6;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #111;
    color: white;
}

.cart-btn {
    cursor: pointer;
    background: #00bcd4;
    padding: 8px 15px;
    border-radius: 20px;
}

/* PRODUCTS */
.products {
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

.card button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

/* CART DRAWER */
.cart {
    position: fixed;
    right: -400px;
    top: 0;
    width: 350px;
    height: 100%;
    background: white;
    box-shadow: -5px 0 15px rgba(0,0,0,0.2);
    padding: 20px;
    transition: 0.3s;
}

.cart.active {
    right: 0;
}

.cart-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

.total {
    font-weight: bold;
    margin-top: 20px;
}
</style>
</head>

<body>

<nav>
    <h2> MA TechStore</h2>
    <div class="cart-btn" onclick="toggleCart()">
        Cart (<span id="count">0</span>)
    </div>
</nav>

<section class="products">
    <div class="grid">

        <!-- iPhone -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
            <h3>iPhone 14</h3>
            <p>₹70000</p>
            <button onclick="addToCart('iPhone 14',70000)">Add</button>
        </div>

        <!-- Laptop -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
            <h3>MacBook Pro</h3>
            <p>₹120000</p>
            <button onclick="addToCart('MacBook Pro',120000)">Add</button>
        </div>

        <!-- Headphones -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1518449032857-31c2c7c7c7e5">
            <h3>Wireless Headphones</h3>
            <p>₹3000</p>
            <button onclick="addToCart('Headphones',3000)">Add</button>
        </div>

        <!-- Smart Watch -->
        <div class="card">
            <img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
            <h3>Smart Watch</h3>
            <p>₹5000</p>
            <button onclick="addToCart('Smart Watch',5000)">Add</button>
        </div>

    </div>
</section>

<!-- CART -->
<div class="cart" id="cart">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <p class="total">Total: ₹<span id="total">0</span></p>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function addToCart(name, price) {
    let item = cart.find(p => p.name === name);

    if(item) {
        item.qty++;
    } else {
        cart.push({name, price, qty:1});
    }

    saveCart();
    updateCart();
}

function updateCart() {
    let cartItems = document.getElementById("cart-items");
    let total = 0;
    let count = 0;

    cartItems.innerHTML = "";

    cart.forEach((item, index) => {
        total += item.price * item.qty;
        count += item.qty;

        cartItems.innerHTML += `
        <div class="cart-item">
            ${item.name} (${item.qty})
            <button onclick="removeItem(${index})">❌</button>
        </div>
        `;
    });

    document.getElementById("total").innerText = total;
    document.getElementById("count").innerText = count;
}

function removeItem(index) {
    cart.splice(index,1);
    saveCart();
    updateCart();
}

function toggleCart() {
    document.getElementById("cart").classList.toggle("active");
}

updateCart();
</script>

</body>
</html>
